<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 무한도전! 랜덤 넌센스 퀴즈 게임 ⚡</title>
    <!-- Google Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #5c4ce3;
            --primary-hover: #4b3bc9;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
            --text-color: #2c3e50;
            --font-outline: 0 1px 4px rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
            transition: background 1.5s ease-in-out;
            background-size: 400% 400% !important;
            animation: gradientShift 25s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 4개 시즌별 감성 수채화 그라데이션 */
        body.theme-spring {
            background: linear-gradient(135deg, #ffd3e8, #ffebdf, #d4f5d8);
        }
        body.theme-summer {
            background: linear-gradient(135deg, #9ae2f5, #b8f1d3, #fff1b8);
        }
        body.theme-autumn {
            background: linear-gradient(135deg, #fcd0a1, #fde4c3, #eb9486);
        }
        body.theme-night {
            background: linear-gradient(135deg, #1c2340, #343f70, #2b1d42);
            color: #f8f9fa;
        }
        body.theme-sunset {
            background: linear-gradient(135deg, #ff7e5f, #feb47b, #765285, #351c4b);
            color: #fff9f9;
        }

        .ambient-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        /* 바람에 흩날리는 벚꽃잎/낙엽/구름 컴포넌트 */
        .ambient-item {
            position: absolute;
            will-change: transform, opacity;
            opacity: 0;
        }

        /* 벚꽃잎 애니메이션 */
        .petal {
            width: 15px;
            height: 15px;
            background: #ffb7b2;
            border-radius: 15px 0 15px 10px;
            animation: fallAndWind 12s linear infinite;
        }

        /* 가을 낙엽 애니메이션 */
        .leaf {
            width: 20px;
            height: 12px;
            background: #e17055;
            border-radius: 20px 0 20px 0;
            animation: fallAndWind 15s linear infinite;
        }

        /* 밤하늘 풍등 애니메이션 */
        .lantern {
            width: 24px;
            height: 32px;
            background: rgba(255, 168, 1, 0.7);
            border-radius: 12px 12px 4px 4px;
            box-shadow: 0 0 12px rgba(255, 147, 26, 0.8);
            animation: floatUp 18s linear infinite;
        }

        /* 여름 반딧불이 */
        .firefly {
            width: 6px;
            height: 6px;
            background: #fffa65;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff200;
            animation: floatWander 9s ease-in-out infinite alternate;
        }

        /* 미세 구름 */
        .fluffy-cloud {
            background: rgba(255, 255, 255, 0.45);
            border-radius: 100px;
            position: absolute;
            filter: blur(8px);
            animation: driftCloud 45s linear infinite;
        }
        .fluffy-cloud::before, .fluffy-cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50%;
        }

        @keyframes fallAndWind {
            0% { transform: translateY(-5%) translateX(-5%) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105%) translateX(60%) rotate(720deg); opacity: 0; }
        }

        @keyframes floatUp {
            0% { transform: translateY(105%) translateX(0) scale(0.8); opacity: 0; }
            15% { opacity: 0.75; }
            85% { opacity: 0.75; }
            100% { transform: translateY(-5%) translateX(-40px) scale(1.1); opacity: 0; }
        }

        @keyframes floatWander {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            30% { opacity: 0.9; transform: translateY(60vh) translateX(50px); }
            60% { transform: translateY(30vh) translateX(-50px); }
            100% { transform: translateY(0) translateX(20px); opacity: 0; }
        }

        @keyframes driftCloud {
            0% { transform: translateX(-20vw); }
            100% { transform: translateX(110vw); }
        }

        .game-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.08), 
                        inset 0 0 20px rgba(255, 255, 255, 0.15);
            width: 100%;
            max-width: 500px;
            padding: 35px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* 다크테마 시 글래스모피즘 카드 보정 */
        body.theme-night .game-container {
            background: rgba(44, 53, 90, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: #f1f2f6;
        }

        body.theme-sunset .game-container {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }

        .screen {
            display: none;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .screen.active {
            display: block;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 타이틀 감성 서체 가독성 보강 */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: #3b2cc4;
            font-weight: 900;
            word-break: keep-all;
            text-shadow: var(--font-outline);
        }
        body.theme-night h1 {
            color: #9cb3ff;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
        }
        body.theme-sunset h1 {
            color: #fff1e6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p.subtitle {
            font-size: 1.05rem;
            color: #57606f;
            margin-bottom: 25px;
            word-break: keep-all;
        }
        body.theme-night p.subtitle {
            color: #ced6e0;
        }
        body.theme-sunset p.subtitle {
            color: #f1f2f6;
        }

        .btn {
            background: linear-gradient(135deg, #6c5ce7, #5b4bc4);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.15rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(108, 92, 231, 0.25);
            width: 100%;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 22px rgba(108, 92, 231, 0.35);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.3);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: none;
            backdrop-filter: blur(4px);
        }
        body.theme-night .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f2f6;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.45);
            color: #000;
        }

        /* --- 헤더 및 원형 타이머 스키마 --- */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-box, .score-box {
            font-weight: 700;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        body.theme-night .progress-box, 
        body.theme-night .score-box {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .timer-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 80px;
            height: 80px;
        }

        .timer-svg circle {
            stroke-width: 6px;
            fill: transparent;
        }

        .timer-bg {
            stroke: rgba(255, 255, 255, 0.25);
        }

        .timer-bar {
            stroke: var(--primary-color);
            stroke-dasharray: 220;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--primary-color);
        }
        body.theme-night .timer-text {
            color: #9cb3ff;
        }

        .question-box {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 25px;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            word-break: keep-all;
            line-height: 1.55;
            text-shadow: var(--font-outline);
        }
        body.theme-night .question-box {
            text-shadow: none;
        }

        .choices-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.45);
            padding: 15px 22px;
            border-radius: 18px;
            font-size: 1.05rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            width: 100%;
            color: var(--text-color);
            backdrop-filter: blur(8px);
        }
        body.theme-night .choice-btn {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ecf0f1;
        }

        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }
        body.theme-night .choice-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .choice-number {
            background: rgba(255, 255, 255, 0.6);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-right: 14px;
            font-size: 0.9rem;
            font-weight: 900;
            flex-shrink: 0;
            color: var(--primary-color);
        }
        body.theme-night .choice-number {
            background: rgba(255, 255, 255, 0.2);
            color: #9cb3ff;
        }

        /* 정답 및 오답 캡슐 피드백 스타일 */
        .choice-btn.correct {
            background-color: rgba(46, 204, 113, 0.35) !important;
            border-color: var(--success-color) !important;
            color: #1b5e20 !important;
        }
        body.theme-night .choice-btn.correct {
            color: #a3e9b9 !important;
        }
        .choice-btn.correct .choice-number {
            background-color: var(--success-color) !important;
            color: white !important;
        }

        .choice-btn.wrong {
            background-color: rgba(231, 76, 60, 0.35) !important;
            border-color: var(--danger-color) !important;
            color: #721c24 !important;
        }
        body.theme-night .choice-btn.wrong {
            color: #ff9f9f !important;
        }
        .choice-btn.wrong .choice-number {
            background-color: var(--danger-color) !important;
            color: white !important;
        }

        .skip-container {
            margin-top: 15px;
        }
        .btn-skip {
            background: none;
            border: none;
            color: #747d8c;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 700;
            text-underline-offset: 4px;
        }
        body.theme-night .btn-skip {
            color: #a4b0be;
        }
        .btn-skip:hover {
            opacity: 0.8;
        }

        .effect-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .effect-overlay.show {
            opacity: 1;
        }

        /* 정답: 회전하는 따사로운 햇살선 */
        .correct-sunburst {
            position: absolute;
            top: 50%; left: 50%;
            width: 250vmax; height: 250vmax;
            transform: translate(-50%, -50%) rotate(0deg);
            background: repeating-conic-gradient(
                from 0deg, 
                rgba(255, 234, 167, 0.22) 0deg 12deg, 
                transparent 12deg 24deg
            );
            animation: spinSunburst 25s linear infinite;
        }
        @keyframes spinSunburst {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 정답: 반짝이는 동화 풍 파티클 */
        .sparkle {
            position: absolute;
            width: 14px; height: 14px;
            background: radial-gradient(circle, #fff 10%, rgba(255, 242, 0, 0.9) 80%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: popSparkle 1.8s ease-out forwards;
            will-change: transform, opacity;
        }
        @keyframes popSparkle {
            0% { transform: translate3d(0, 0, 0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate3d(var(--tx), var(--ty), 0) scale(1.3) rotate(360deg); opacity: 0; }
        }

        /* 오답: 쏟아지는 감성 빗물 효과 */
        .rain-line {
            position: absolute;
            background: linear-gradient(transparent, rgba(116, 185, 255, 0.45));
            width: 2.5px;
            height: 35px;
            animation: fallRain 0.8s linear infinite;
            will-change: transform, opacity;
        }
        @keyframes fallRain {
            0% { transform: translateY(-80px) rotate(15deg); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
        }

        /* 오답: 떠오르는 먹구름 귀요미 */
        .sad-cloud {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            width: 140px;
            height: 60px;
            background: #7f8fa6;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            filter: blur(1px);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .sad-cloud.show {
            transform: translateX(-50%) translateY(0);
        }
        .sad-cloud::before {
            content: '';
            position: absolute;
            background: #7f8fa6;
            border-radius: 50%;
            width: 70px; height: 70px;
            top: -30px; left: 20px;
        }
        .sad-cloud::after {
            content: '';
            position: absolute;
            background: #7f8fa6;
            border-radius: 50%;
            width: 55px; height: 55px;
            top: -22px; right: 25px;
        }
        .cloud-eyes {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            z-index: 10;
        }
        .cloud-eye {
            width: 8px; height: 8px;
            background: #2f3640;
            border-radius: 50%;
        }
        .cloud-mouth {
            width: 16px; height: 8px;
            border: 2px solid #2f3640;
            border-bottom: 0;
            border-radius: 8px 8px 0 0;
            transform: rotate(180deg);
            margin-top: 4px;
            z-index: 10;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(47, 54, 64, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-align: center;
            color: var(--text-color);
        }

        @keyframes modalPop {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .feedback-emoji {
            font-size: 3.5rem;
            margin-bottom: 8px;
            animation: gentleBounce 1.5s alternate infinite ease-in-out;
        }

        @keyframes gentleBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .feedback-title {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .feedback-title.correct-text { color: var(--success-color); }
        .feedback-title.wrong-text { color: var(--danger-color); }

        .feedback-comment {
            font-weight: 500;
            margin-bottom: 15px;
        }

        .explanation-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2f3542;
            margin-bottom: 20px;
            word-break: keep-all;
            line-height: 1.45;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* --- 결과 화면 세부 디자인 --- */
        .result-badge {
            font-size: 4.5rem;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
        }
        .grade-text {
            font-size: 1.75rem;
            font-weight: 900;
            color: #5c4ce3;
            margin-bottom: 20px;
            text-shadow: var(--font-outline);
        }
        body.theme-sunset .grade-text {
            color: #fff275;
            text-shadow: 0 1px 10px rgba(0,0,0,0.4);
        }
        .stats-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 18px;
            padding: 15px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }
        body.theme-night .stats-table {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.02rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        body.theme-night .stats-row {
            border-color: rgba(255, 255, 255, 0.1);
        }
        .stats-row:last-child {
            border-bottom: none;
            font-weight: 800;
            color: #3b2cc4;
        }
        body.theme-night .stats-row:last-child {
            color: #9cb3ff;
        }
        body.theme-sunset .stats-row:last-child {
            color: #fff1e6;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            background: rgba(45, 52, 54, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.95rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 200;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="theme-spring">

    <!-- 감성 엠비언트 파티클 및 기후 오브젝트 영역 -->
    <div class="ambient-layer" id="ambient-container"></div>

    <!-- 정오답 비주얼 이펙트 레이어 -->
    <div class="effect-overlay" id="visual-effects"></div>

    <div class="game-container">
        <!-- 1. START SCREEN -->
        <div id="start-screen" class="screen active">
            <div style="font-size: 4.2rem; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));">🌸</div>
            <h1>뇌말랑 넌센스 퀴즈</h1>

        const ambientManager = {
            activeTheme: 'spring',

            initAmbient(theme) {
                this.activeTheme = theme;
                const container = document.getElementById("ambient-container");
                container.innerHTML = ""; // 클리어

                document.body.className = "theme-" + theme;

                if (theme === 'spring') {
                    this.spawnItems(container, 'petal', 15);
                    this.spawnClouds(container, 3);
                } else if (theme === 'summer') {
                    this.spawnItems(container, 'firefly', 18);
                    this.spawnClouds(container, 4);
                } else if (theme === 'autumn') {
                    this.spawnItems(container, 'leaf', 15);
                    this.spawnClouds(container, 3);
                } else if (theme === 'night') {
                    this.spawnItems(container, 'lantern', 12);
                    this.spawnTwinkleStars(container, 30);
                } else if (theme === 'sunset') {
                    this.spawnTwinkleStars(container, 25);
                }
            },

            spawnItems(container, className, count) {
                for (let i = 0; i < count; i++) {
                    const item = document.createElement("div");
                    item.className = `ambient-item ${className}`;
                    item.style.left = `${Math.random() * 100}%`;
                    item.style.top = `${Math.random() * -20}%`;
                    item.style.animationDelay = `${Math.random() * 15}s`;
                    item.style.animationDuration = `${10 + Math.random() * 12}s`;
                    container.appendChild(item);
                }
            },

            spawnClouds(container, count) {
                for (let i = 0; i < count; i++) {
                    const cloud = document.createElement("div");
                    cloud.className = "fluffy-cloud";
                    cloud.style.width = `${120 + Math.random() * 150}px`;
                    cloud.style.height = `${40 + Math.random() * 40}px`;
                    cloud.style.top = `${10 + Math.random() * 40}%`;
                    cloud.style.animationDelay = `${Math.random() * -45}s`;
                    container.appendChild(cloud);
                }
            },

            spawnTwinkleStars(container, count) {
                for (let i = 0; i < count; i++) {
                    const star = document.createElement("div");
                    star.className = "ambient-item";
                    star.style.position = "absolute";
                    star.style.width = `${1 + Math.random() * 3}px`;
                    star.style.height = star.style.width;
                    star.style.background = "white";
                    star.style.borderRadius = "50%";
                    star.style.left = `${Math.random() * 100}%`;
                    star.style.top = `${Math.random() * 85}%`;
                    star.style.opacity = Math.random();
                    star.style.animation = `pulse ${1 + Math.random() * 2}s ease-in-out infinite alternate`;
                    container.appendChild(star);
                }
            }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const gameManager = {
            currentQuestions: [],
            currentQuestionIdx: 0,
            score: 0,
            hasUsedSkip: false,
            timerInterval: null,
            timeLeft: 15,
            isAnswered: false,

            init() {
                const highScore = localStorage.getItem("nonsense_highscore") || 0;
                document.getElementById("main-highscore").innerText = `🏆 최고 점수: ${highScore}점`;
                ambientManager.initAmbient('spring');
            },

            switchScreen(screenId) {
                const screens = document.querySelectorAll(".screen");
                screens.forEach(s => s.classList.remove("active"));
                document.getElementById(screenId).classList.add("active");
            },

            startGame() {
                this.score = 0;
                this.currentQuestionIdx = 0;
                this.hasUsedSkip = false;
                this.isAnswered = false;

                const shuffledDb = shuffleArray([...quizDatabase]);
                this.currentQuestions = shuffledDb.slice(0, 10);

                const skipBtn = document.getElementById("skip-btn");
                skipBtn.disabled = false;
                skipBtn.innerText = "이 문제는 다음 기회에 (1회 가능)";

                // 게임 시작 시 무작위 시즌 테마 지정
                const seasons = ['spring', 'summer', 'autumn', 'night'];
                const randomSeason = seasons[Math.floor(Math.random() * seasons.length)];
                ambientManager.initAmbient(randomSeason);

                this.switchScreen("game-screen");
                this.loadQuestion();
            },

            loadQuestion() {
                this.isAnswered = false;
                const currentQuiz = this.currentQuestions[this.currentQuestionIdx];

                document.getElementById("current-idx").innerText = this.currentQuestionIdx + 1;
                document.getElementById("current-score").innerText = this.score;
                document.getElementById("question-text").innerText = `Q. ${currentQuiz.q}`;

                const choices = [currentQuiz.a, ...currentQuiz.c];
                shuffleArray(choices);

                const choicesBox = document.getElementById("choices-box");
                choicesBox.innerHTML = "";
                
                choices.forEach((choiceText, index) => {
                    const button = document.createElement("button");
                    button.className = "choice-btn";
                    button.onclick = () => this.checkAnswer(choiceText, button);
                    
                    button.innerHTML = `
                        <span class="choice-number">${index + 1}</span>
                        <span class="choice-text">${choiceText}</span>
                    `;
                    choicesBox.appendChild(button);
                });

                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timerInterval);
                this.timeLeft = 15;
                
                const timerText = document.getElementById("timer-text");
                const timerBar = document.getElementById("timer-bar");
                
                timerText.innerText = this.timeLeft;
                timerBar.style.strokeDashoffset = 0;
                timerBar.style.stroke = "var(--primary-color)";

                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    timerText.innerText = this.timeLeft;

                    const offset = 220 - (220 * this.timeLeft) / 15;
                    timerBar.style.strokeDashoffset = offset;

                    if (this.timeLeft <= 5) {
                        timerBar.style.stroke = "var(--danger-color)";
                    }

                    if (this.timeLeft <= 0) {
                        clearInterval(this.timerInterval);
                        this.handleTimeOut();
                    }
                }, 1000);
            },

            checkAnswer(selectedAnswer, selectedButton) {
                if (this.isAnswered) return;
                this.isAnswered = true;
                clearInterval(this.timerInterval);

                const currentQuiz = this.currentQuestions[this.currentQuestionIdx];
                const isCorrect = (selectedAnswer === currentQuiz.a);

                const allButtons = document.querySelectorAll(".choice-btn");
                allButtons.forEach(btn => {
                    btn.style.cursor = "default";
                    const btnText = btn.querySelector(".choice-text").innerText;
                    if (btnText === currentQuiz.a) {
                        btn.classList.add("correct");
                    }
                });

                if (isCorrect) {
                    this.score += 1;
                    document.getElementById("current-score").innerText = this.score;
                    selectedButton.classList.add("correct");
                    effectManager.triggerCorrect();
                    setTimeout(() => {
                        this.showFeedbackModal(true, currentQuiz.a, currentQuiz.exp);
                    }, 500);
                } else {
                    selectedButton.classList.add("wrong");
                    effectManager.triggerIncorrect();
                    setTimeout(() => {
                        this.showFeedbackModal(false, currentQuiz.a, currentQuiz.exp);
                    }, 500);
                }
            },

            handleTimeOut() {
                this.isAnswered = true;
                const currentQuiz = this.currentQuestions[this.currentQuestionIdx];

                const allButtons = document.querySelectorAll(".choice-btn");
                allButtons.forEach(btn => {
                    btn.style.cursor = "default";
                    if (btn.querySelector(".choice-text").innerText === currentQuiz.a) {
                        btn.classList.add("correct");
                    }
                });

                effectManager.triggerIncorrect();
                setTimeout(() => {
                    this.showFeedbackModal("timeout", currentQuiz.a, currentQuiz.exp);
                }, 500);
            },

            useSkip() {
                if (this.hasUsedSkip || this.isAnswered) return;
                this.hasUsedSkip = true;
                clearInterval(this.timerInterval);

                const skipBtn = document.getElementById("skip-btn");
                skipBtn.disabled = true;
                skipBtn.innerText = "바람을 따라 스킵 완료 🍃";

                this.currentQuestionIdx++;
                if (this.currentQuestionIdx < 10) {
                    this.loadQuestion();
                } else {
                    this.showResult();
                }
            },

            showFeedbackModal(status, correctAns, explanationText) {
                const modal = document.getElementById("feedback-modal");
                const emoji = document.getElementById("modal-emoji");
                const title = document.getElementById("modal-title");
                const comment = document.getElementById("modal-comment");
                const explanation = document.getElementById("modal-explanation");

                explanation.innerHTML = `정답은 바로 <b>[ ${correctAns} ]</b> 입니다!<br><span style="font-size: 0.88rem; display:block; margin-top: 6px; line-height: 1.4;">💡 ${explanationText || "재치 넘치는 아재개그 퀴즈였습니다!"}</span>`;

                if (status === true) {
                    emoji.innerText = "🎉";
                    title.innerText = "정답입니다!";
                    title.className = "feedback-title correct-text";
                    comment.innerText = praiseMents[Math.floor(Math.random() * praiseMents.length)];
                } else if (status === false) {
                    emoji.innerText = "💥";
                    title.innerText = "오답이었군요!";
                    title.className = "feedback-title wrong-text";
                    comment.innerText = cheerMents[Math.floor(Math.random() * cheerMents.length)];
                } else {
                    emoji.innerText = "⏰";
                    title.innerText = "시간이 흘렀어요!";
                    title.className = "feedback-title wrong-text";
                    comment.innerText = "조금만 더 유연한 사고로 고민해 보아요!";
                }

                modal.classList.add("active");
            },

            nextQuestion() {
                document.getElementById("feedback-modal").classList.remove("active");
                this.currentQuestionIdx++;

                if (this.currentQuestionIdx < 10) {
                    this.loadQuestion();
                } else {
                    this.showResult();
                }
            },

            showResult() {
                // 노을과 별빛 테마로 아름다운 분위기 마무리
                ambientManager.initAmbient('sunset');
                this.switchScreen("result-screen");

                const totalScore = this.score;
                const correctCount = this.score;
                const wrongCount = 10 - this.score;

                let highScore = localStorage.getItem("nonsense_highscore") || 0;
                if (totalScore > highScore) {
                    highScore = totalScore;
                    localStorage.setItem("nonsense_highscore", highScore);
                }

                let grade = "";
                let emoji = "";
                if (totalScore === 10) { grade = "넌센스의 지고지신 👑"; emoji = "👑"; }
                else if (totalScore >= 8) { grade = "유연한 현자 😎"; emoji = "😎"; }
                else if (totalScore >= 6) { grade = "빛나는 유망주 😄"; emoji = "😄"; }
                else if (totalScore >= 4) { grade = "도전하는 수련생 🙂"; emoji = "🙂"; }
                else { grade = "아직은 말랑해지는 중 😂"; emoji = "😂"; }

                document.getElementById("result-emoji").innerText = emoji;
                document.getElementById("result-grade").innerText = grade;
                document.getElementById("res-correct").innerText = `${correctCount}개`;
                document.getElementById("res-wrong").innerText = `${wrongCount}개`;
                document.getElementById("res-score").innerText = `${totalScore}점`;
                document.getElementById("res-highscore").innerText = `${highScore}점`;

                document.getElementById("main-highscore").innerText = `🏆 최고 점수: ${highScore}점`;
            },

            shareResult() {
                const totalScore = this.score;
                let grade = "";
                if (totalScore === 10) grade = "넌센스의 신 👑";
                else if (totalScore >= 8) grade = "센스왕 😎";
                else if (totalScore >= 6) grade = "개그 유망주 😄";
                else if (totalScore >= 4) grade = "노력파 🙂";
                else grade = "아재개그 수련생 😂";

                const shareText = `🧠 [뇌말랑 넌센스 퀴즈 모험 결과]\n\n나의 최종 점수: ${totalScore}점 / 10점\n넌센스 등급: ${grade}\n\n동화 속 따스한 배경 속에서 당신의 말랑해진 뇌를 확인해 보세요! ⚡`;
                
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = shareText;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                
                try {
                    document.execCommand('copy');
                    this.showToast();
                } catch (err) {
                    console.error("복사에 실패했습니다.", err);
                }
                
                document.body.removeChild(tempTextArea);
            },

            showToast() {
                const toast = document.getElementById("toast");
                toast.classList.add("show");
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 2500);
            }
        };

        window.onload = function() {
            gameManager.init();
        };
    </script>
</body>
</html>
